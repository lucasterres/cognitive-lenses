<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720" role="img" aria-label="Schematic of latent mode: the prompt primes the model's latent computation, which cannot be read back, and mandatory answer slots force the evidence to surface in the output">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#898781"/>
    </marker>
  </defs>
  <style>
    text { font-family: system-ui, 'Segoe UI', sans-serif; }
    .title { font-size: 21px; font-weight: 700; fill: #0b0b0b; }
    .subtitle { font-size: 13px; fill: #52514e; }
    .band { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; fill: #898781; }
    .boxtitle { font-size: 13px; font-weight: 700; fill: #0b0b0b; }
    .boxtext { font-size: 12.3px; fill: #52514e; }
    .big { font-size: 14.5px; font-weight: 700; fill: #0b0b0b; }
    .note { font-size: 11.5px; font-style: italic; fill: #898781; }
    .foot { font-size: 12px; fill: #898781; }
    .check { font-size: 12.5px; font-weight: 700; fill: #0ca30c; }
    .slot { font-size: 12.5px; fill: #0b0b0b; }
  </style>

  <rect x="0.5" y="0.5" width="1079" height="719" rx="12" fill="#fcfcfb" stroke="#0b0b0b" stroke-opacity="0.10"/>

  <text x="40" y="50" class="title">Latent mode — how text reaches the model’s “subconscious”</text>
  <text x="40" y="76" class="subtitle">Priming, not access: the prompt can influence latent computation, but nothing can read it back.</text>

  <!-- BAND 1: PROMPT -->
  <text x="40" y="116" class="band">1 · PROMPT — THE ONLY SURFACE TEXT CAN TOUCH</text>

  <rect x="40.5" y="130.5" width="306" height="112" rx="10" fill="#f0efec"/>
  <text x="60" y="158" class="boxtitle">Task</text>
  <text x="60" y="182" class="boxtext">“Our API is slow (p95 ~900 ms).</text>
  <text x="60" y="200" class="boxtext">Should we add a Redis cache?”</text>

  <rect x="368.5" y="130.5" width="378" height="112" rx="10" fill="#f0efec"/>
  <text x="388" y="158" class="boxtitle">Silent lens questions (the priming)</text>
  <text x="388" y="180" class="boxtext">“Hold these against the task — don’t write the analysis:</text>
  <text x="388" y="198" class="boxtext">wrong premise? cheapest evidence? worst failure?</text>
  <text x="388" y="216" class="boxtext">simpler shape? who gets hurt?”</text>

  <rect x="768.5" y="130.5" width="271" height="112" rx="10" fill="#f0efec"/>
  <text x="788" y="158" class="boxtitle">Required answer slots</text>
  <text x="788" y="182" class="boxtext">· one challenged premise</text>
  <text x="788" y="200" class="boxtext">· one named risk</text>
  <text x="788" y="218" class="boxtext">· one calibrated confidence</text>

  <line x1="540" y1="248" x2="540" y2="272" stroke="#898781" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- boundary in -->
  <line x1="40" y1="284" x2="1040" y2="284" stroke="#898781" stroke-width="1" stroke-dasharray="6 5"/>
  <text x="1040" y="278" text-anchor="end" class="note">text crosses downward only — influence, not instruction</text>

  <!-- BAND 2: LATENT -->
  <text x="40" y="316" class="band">2 · LATENT COMPUTATION — ACTIVATIONS, NOT LANGUAGE</text>

  <rect x="40.5" y="330.5" width="999" height="122" rx="10" fill="#cde2fb" stroke="#2a78d6" stroke-width="1.2"/>
  <text x="64" y="362" class="big">Multi-constraint processing happens here, token-free</text>
  <text x="64" y="388" class="boxtext" fill="#0b0b0b">Compute per generated token is fixed — priming changes which internal computation runs, not how much output you pay for.</text>
  <text x="64" y="410" class="boxtext">Evidence it exists: circuit tracing caught Claude choosing a rhyme word before writing the line (Anthropic, 2025).</text>
  <text x="64" y="432" class="boxtext">No lens “agents” run here — one forward computation, shaped by the primed constraints.</text>

  <line x1="540" y1="458" x2="540" y2="482" stroke="#898781" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- boundary out -->
  <line x1="40" y1="494" x2="1040" y2="494" stroke="#898781" stroke-width="1" stroke-dasharray="6 5"/>
  <text x="1040" y="488" text-anchor="end" class="note">no readback — the model’s self-report is ≈20% reliable (introspection, 2025)</text>

  <!-- BAND 3: OUTPUT -->
  <text x="40" y="526" class="band">3 · VISIBLE OUTPUT — WHERE THE EVIDENCE MUST SURFACE</text>

  <rect x="40.5" y="540.5" width="999" height="112" rx="10" fill="#ffffff" stroke="#0b0b0b" stroke-opacity="0.10"/>
  <text x="64" y="570" class="boxtitle">Answer + mandatory slots</text>
  <text x="64" y="596" class="slot">“Not yet — measure the bottleneck first…”</text>
  <text x="420" y="596" class="check">✓</text><text x="438" y="596" class="slot">premise challenged</text>
  <text x="592" y="596" class="check">✓</text><text x="610" y="596" class="slot">risk named</text>
  <text x="716" y="596" class="check">✓</text><text x="734" y="596" class="slot">confidence stated</text>
  <text x="64" y="626" class="note">The slots are the proof-of-work: without them, failed priming is indistinguishable from an ordinary direct answer.</text>

  <text x="40" y="690" class="foot">Cost ≈ 1–2× a direct answer · unverified by design — when someone must audit the reasoning, run the explicit pipeline instead (per-lens artifacts, ≈10–20×). Sources: docs/research.md</text>
</svg>
